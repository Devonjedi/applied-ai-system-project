<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">SignalFlow Music Recommender System Architecture</title>
  <desc id="desc">Architecture diagram showing user prompt flow through the Streamlit app, guardrails, retriever, catalog, explanation layer, output, human review, and evaluation suite.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#2f5bea"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .label { font: 700 24px Helvetica, Arial, sans-serif; fill: #0f172a; }
      .sub { font: 500 18px Helvetica, Arial, sans-serif; fill: #334155; }
      .title { font: 700 40px Helvetica, Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 16px Helvetica, Arial, sans-serif; fill: #475569; }
      .box { rx: 24; ry: 24; filter: url(#shadow); }
      .line { stroke: #2f5bea; stroke-width: 6; fill: none; marker-end: url(#arrow); }
      .dashed { stroke: #0f766e; stroke-width: 5; fill: none; stroke-dasharray: 14 14; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#f8fafc"/>
  <text x="120" y="92" class="title">SignalFlow Music Recommender</text>
  <text x="120" y="128" class="small">Retrieval-augmented recommendation with grounded explanations and evaluation</text>

  <rect class="box" x="120" y="190" width="260" height="120" fill="#dbeafe"/>
  <text x="160" y="240" class="label">User Prompt</text>
  <text x="160" y="274" class="sub">Natural-language request</text>
  <text x="160" y="300" class="sub">genre, mood, activity</text>

  <rect class="box" x="450" y="190" width="280" height="120" fill="#e0f2fe"/>
  <text x="490" y="240" class="label">Streamlit App</text>
  <text x="490" y="274" class="sub">UI controls, tabs,</text>
  <text x="490" y="300" class="sub">history, reliability view</text>

  <rect class="box" x="800" y="190" width="300" height="120" fill="#dcfce7"/>
  <text x="840" y="240" class="label">Guardrails + Intent Parse</text>
  <text x="840" y="274" class="sub">Validate prompt length,</text>
  <text x="840" y="300" class="sub">extract genre, mood, scene</text>

  <rect class="box" x="1160" y="190" width="300" height="120" fill="#ede9fe"/>
  <text x="1200" y="240" class="label">Retriever + Ranker</text>
  <text x="1200" y="274" class="sub">Score songs with metadata,</text>
  <text x="1200" y="300" class="sub">energy, and term overlap</text>

  <rect class="box" x="1160" y="410" width="300" height="120" fill="#fef3c7"/>
  <text x="1200" y="460" class="label">Explanation Layer</text>
  <text x="1200" y="494" class="sub">Local summary or optional</text>
  <text x="1200" y="520" class="sub">OpenAI grounded summary</text>

  <rect class="box" x="1160" y="640" width="300" height="120" fill="#fee2e2"/>
  <text x="1200" y="690" class="label">Recommendations</text>
  <text x="1200" y="724" class="sub">Top songs, reasons,</text>
  <text x="1200" y="750" class="sub">scores, confidence</text>

  <rect class="box" x="720" y="410" width="290" height="120" fill="#cffafe"/>
  <text x="760" y="460" class="label">Song Catalog</text>
  <text x="760" y="494" class="sub">CSV dataset with genre,</text>
  <text x="760" y="520" class="sub">energy, tags, scene, mood</text>

  <rect class="box" x="380" y="640" width="330" height="120" fill="#f1f5f9"/>
  <text x="420" y="690" class="label">Human Review</text>
  <text x="420" y="724" class="sub">Inspect recommendations,</text>
  <text x="420" y="750" class="sub">confidence, and retrieval trace</text>

  <rect class="box" x="760" y="640" width="290" height="120" fill="#ccfbf1"/>
  <text x="800" y="690" class="label">Evaluation Suite</text>
  <text x="800" y="724" class="sub">Fixed prompts, expected</text>
  <text x="800" y="750" class="sub">titles, genre, energy checks</text>

  <path class="line" d="M 380 250 L 450 250"/>
  <path class="line" d="M 730 250 L 800 250"/>
  <path class="line" d="M 1100 250 L 1160 250"/>
  <path class="line" d="M 1310 310 L 1310 410"/>
  <path class="line" d="M 1310 530 L 1310 640"/>
  <path class="line" d="M 1010 470 L 1160 470"/>
  <path class="line" d="M 875 640 L 875 560 L 1160 560"/>

  <path class="dashed" d="M 1160 700 L 710 700"/>
  <path class="dashed" d="M 710 700 L 710 700 L 760 700"/>
  <path class="dashed" d="M 710 700 L 710 530 L 760 530"/>

  <text x="454" y="820" class="small">Human review and the evaluation suite help check whether retrieved results actually match user intent.</text>
</svg>
