<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">SignalFlow Music Recommender System Architecture</title>
  <desc id="desc">Architecture diagram showing user prompt flow through the Streamlit app, guardrails, retriever, catalog, explanation layer, recommendation output, human review, and evaluation.</desc>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#f8fafc"/>

  <text x="120" y="90" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#0f172a">
    SignalFlow Music Recommender
  </text>
  <text x="120" y="128" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#475569">
    Retrieval-augmented recommendation with grounded explanations and evaluation
  </text>

  <g filter="url(#shadow)">
    <rect x="120" y="190" width="250" height="110" rx="22" fill="#dbeafe"/>
    <rect x="430" y="190" width="280" height="110" rx="22" fill="#e0f2fe"/>
    <rect x="770" y="190" width="310" height="110" rx="22" fill="#dcfce7"/>
    <rect x="1140" y="190" width="320" height="110" rx="22" fill="#ede9fe"/>

    <rect x="1140" y="390" width="320" height="110" rx="22" fill="#fef3c7"/>
    <rect x="730" y="390" width="290" height="110" rx="22" fill="#cffafe"/>

    <rect x="1140" y="620" width="320" height="110" rx="22" fill="#fee2e2"/>
    <rect x="360" y="620" width="330" height="110" rx="22" fill="#f1f5f9"/>
    <rect x="730" y="620" width="290" height="110" rx="22" fill="#ccfbf1"/>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" fill="#0f172a">
    <text x="155" y="235" font-size="26" font-weight="700">User Prompt</text>
    <text x="155" y="265" font-size="18">Natural-language request</text>
    <text x="155" y="288" font-size="18">genre, mood, activity</text>

    <text x="470" y="235" font-size="26" font-weight="700">Streamlit App</text>
    <text x="470" y="265" font-size="18">UI controls, tabs, history,</text>
    <text x="470" y="288" font-size="18">and reliability view</text>

    <text x="800" y="235" font-size="26" font-weight="700">Guardrails + Intent Parse</text>
    <text x="800" y="265" font-size="18">Validate prompt length and</text>
    <text x="800" y="288" font-size="18">extract genre, scene, mood</text>

    <text x="1175" y="235" font-size="26" font-weight="700">Retriever + Ranker</text>
    <text x="1175" y="265" font-size="18">Score songs using metadata,</text>
    <text x="1175" y="288" font-size="18">energy, and term overlap</text>

    <text x="1175" y="435" font-size="26" font-weight="700">Explanation Layer</text>
    <text x="1175" y="465" font-size="18">Local summary or optional</text>
    <text x="1175" y="488" font-size="18">OpenAI grounded summary</text>

    <text x="765" y="435" font-size="26" font-weight="700">Song Catalog</text>
    <text x="765" y="465" font-size="18">CSV dataset with genre,</text>
    <text x="765" y="488" font-size="18">energy, tags, scene, mood</text>

    <text x="1175" y="665" font-size="26" font-weight="700">Recommendations</text>
    <text x="1175" y="695" font-size="18">Top songs, reasons,</text>
    <text x="1175" y="718" font-size="18">scores, and confidence</text>

    <text x="395" y="665" font-size="26" font-weight="700">Human Review</text>
    <text x="395" y="695" font-size="18">Inspect recommendations,</text>
    <text x="395" y="718" font-size="18">confidence, and trace</text>

    <text x="765" y="665" font-size="26" font-weight="700">Evaluation Suite</text>
    <text x="765" y="695" font-size="18">Fixed prompts, expected</text>
    <text x="765" y="718" font-size="18">titles, genre, energy checks</text>
  </g>

  <g stroke="#2563eb" stroke-width="6" fill="none">
    <line x1="370" y1="245" x2="412" y2="245"/>
    <polygon points="412,237 430,245 412,253" fill="#2563eb" stroke="none"/>

    <line x1="710" y1="245" x2="752" y2="245"/>
    <polygon points="752,237 770,245 752,253" fill="#2563eb" stroke="none"/>

    <line x1="1080" y1="245" x2="1122" y2="245"/>
    <polygon points="1122,237 1140,245 1122,253" fill="#2563eb" stroke="none"/>

    <line x1="1300" y1="300" x2="1300" y2="372"/>
    <polygon points="1292,372 1300,390 1308,372" fill="#2563eb" stroke="none"/>

    <line x1="1300" y1="500" x2="1300" y2="602"/>
    <polygon points="1292,602 1300,620 1308,602" fill="#2563eb" stroke="none"/>

    <line x1="1020" y1="445" x2="1122" y2="445"/>
    <polygon points="1122,437 1140,445 1122,453" fill="#2563eb" stroke="none"/>
  </g>

  <g stroke="#0f766e" stroke-width="5" fill="none" stroke-dasharray="14 12">
    <line x1="1140" y1="675" x2="708" y2="675"/>
    <polygon points="708,667 690,675 708,683" fill="#0f766e" stroke="none"/>

    <polyline points="690,675 690,555 712,555"/>
    <polygon points="712,547 730,555 712,563" fill="#0f766e" stroke="none"/>

    <line x1="690" y1="675" x2="712" y2="675"/>
    <polygon points="712,667 730,675 712,683" fill="#0f766e" stroke="none"/>
  </g>

  <text x="120" y="820" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#475569">
    Human review and the evaluation suite help verify that retrieved songs actually match user intent.
  </text>
</svg>
